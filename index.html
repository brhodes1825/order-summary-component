<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="viewport" width="width=device-width, intitial-scale=1.0">
    <title><img src="favicon-32x32.png">Order Summary</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="card">
        <div class="container">
          <div class="banner">
            <img class="hero" src="illustration-hero.svg">
          </div>
          <div class="text">
            <p class="title">Order Summary</p>
            <p class="info">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
          </div>
          <div class="details">
            <img class="breve" src="icon-music.svg">
            <p class="plan">Annual Plan</p>
            <p class="cost">$59.99/year</p>
            <a class="change" href="https://www.google.com" target="_blank">Change</a>
          </div>
          <div class="payment">
            <button class="btn">Proceed to Payment</button>
          </div>
          <a class="cancel" href="https://www.google.com" target="_blank">Cancel Order</a>
        </div>
      </div>
    </main>
  </body>
